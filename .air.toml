root = "."
tmp_dir = "tmp"

[build]
cmd = "PATH=$HOME/go/bin:$PATH make build"
bin = "./bin/server"
include_ext = ["go", "templ", "css"]
exclude_dir = ["tmp", "bin", ".git", ".claude", "node_modules"]
exclude_regex = ["_templ\\.go$", "app\\.css$"]
delay = 1000
kill_delay = 500

[misc]
clean_on_exit = true
